name: CMX MCP tests

on:
  pull_request:
    paths:
      - "mcp/**"
      - ".github/workflows/cmx-mcp-tests.yml"
  push:
    branches:
      - feature/cmx-mcp-sqlite-mvp
    paths:
      - "mcp/**"
      - ".github/workflows/cmx-mcp-tests.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ./mcp pytest
      - name: Compile
        run: python -m compileall -q mcp/src
      - name: Unit tests
        run: python -m pytest -q mcp/tests
