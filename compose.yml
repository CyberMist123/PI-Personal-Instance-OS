name: pi-os

services:
  db:
    image: postgres:14-alpine
    restart: unless-stopped
    shm_size: 256mb
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mastodon_production}
      POSTGRES_USER: ${POSTGRES_USER:-mastodon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mastodon} -d ${POSTGRES_DB:-mastodon_production}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - ./data/redis:/data
    networks:
      - data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    image: ghcr.io/mastodon/mastodon:v4.6.3
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      RAILS_ENV: production
      BIND: 0.0.0.0
      PORT: 3000
    command: bundle exec puma -C config/puma.rb
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data/media:/mastodon/public/system
    expose:
      - "3000"
    networks:
      - app
      - data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS --noproxy localhost http://localhost:3000/health | grep -q OK"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s

  streaming:
    image: ghcr.io/mastodon/mastodon-streaming:v4.6.3
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      BIND: 0.0.0.0
      PORT: 4000
    command: node ./streaming/index.js
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "4000"
    networks:
      - app
      - data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/v1/streaming/health | grep -q OK"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 30s

  sidekiq:
    image: ghcr.io/mastodon/mastodon:v4.6.3
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      RAILS_ENV: production
    command: bundle exec sidekiq
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data/media:/mastodon/public/system
    networks:
      - app
      - data

  nginx:
    image: nginx:stable-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
      streaming:
        condition: service_healthy
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "127.0.0.1:8080:80"
    networks:
      - edge
      - app
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/_pi/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    profiles:
      - tunnel
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:?Set CLOUDFLARE_TUNNEL_TOKEN in .env}
    depends_on:
      nginx:
        condition: service_healthy
    networks:
      - edge

networks:
  edge:
  app:
  data:
    internal: true
